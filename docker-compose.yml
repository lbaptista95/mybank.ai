version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fintech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintech_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintech}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: fintech-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fintech-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging: *default-logging

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fintech-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transaction.created --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transaction.approved --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transaction.rejected --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fraud.alert --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.send --partitions 3 --replication-factor 1
      echo 'Kafka topics created.'
      "

  # ─── Services ─────────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: fintech-api-gateway
    restart: unless-stopped
    depends_on:
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-at-least-32-characters-long}
      JWT_ISSUER: ${JWT_ISSUER:-MyBankAI}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-MyBankAI.Clients}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  account-service:
    build:
      context: ./AccountService
      dockerfile: Dockerfile
    container_name: fintech-account-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${ACCOUNT_DB_CONNECTION:-Host=postgres;Port=5432;Database=accountdb;Username=fintech;Password=fintech_secret_2024}
      Jwt__Secret: ${JWT_SECRET:-your-super-secret-jwt-key-at-least-32-characters-long}
      Jwt__Issuer: ${JWT_ISSUER:-MyBankAI}
      Jwt__Audience: ${JWT_AUDIENCE:-MyBankAI.Clients}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  transaction-service:
    build:
      context: ./TransactionService
      dockerfile: Dockerfile
    container_name: fintech-transaction-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${TRANSACTION_DB_CONNECTION:-Host=postgres;Port=5432;Database=transactiondb;Username=fintech;Password=fintech_secret_2024}
      Jwt__Secret: ${JWT_SECRET:-your-super-secret-jwt-key-at-least-32-characters-long}
      Jwt__Issuer: ${JWT_ISSUER:-MyBankAI}
      Jwt__Audience: ${JWT_AUDIENCE:-MyBankAI.Clients}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  fraud-service:
    build:
      context: ./FraudDetectionService
      dockerfile: Dockerfile
    container_name: fintech-fraud-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${FRAUD_DB_CONNECTION:-Host=postgres;Port=5432;Database=frauddb;Username=fintech;Password=fintech_secret_2024}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      Kafka__GroupId: ${KAFKA_GROUP_ID_FRAUD:-fraud-detection-group}
      Groq__ApiKey: ${GROQ_API_KEY:-gsk_placeholder}
      Groq__BaseUrl: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      Groq__Model: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  notification-service:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: fintech-notification-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${NOTIFICATION_DB_CONNECTION:-Host=postgres;Port=5432;Database=notificationdb;Username=fintech;Password=fintech_secret_2024}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      Kafka__GroupId: ${KAFKA_GROUP_ID_NOTIFICATION:-notification-group}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  postgres_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:

networks:
  default:
    name: fintech-network
